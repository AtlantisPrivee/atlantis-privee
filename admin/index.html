<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Control — Sign In</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                ATLANTIS
                <small>PRIVÉE</small>
            </div>
            <div class="login-subtitle">Editorial Control Panel</div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>GitHub Username</label>
                    <input type="text" id="username" placeholder="your-github-username" required>
                </div>
                <div class="form-group">
                    <label>Repository Name</label>
                    <input type="text" id="repo" placeholder="atlantis-privee" required>
                </div>
                <div class="form-group">
                    <label>GitHub Personal Access Token</label>
                    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="password" placeholder="Local password" required>
                </div>
                <button type="submit" class="btn btn-full">Sign In →</button>
            </form>

            <p class="login-error" id="loginError">⚠ Invalid credentials or repository</p>

            <div class="help-text">
                <strong>🔑 How to get your GitHub Token:</strong><br>
                1. Go to <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings → Tokens</a><br>
                2. Generate new token (classic)<br>
                3. Select scope: <code>repo</code> (full control)<br>
                4. Copy and paste here<br><br>
                <strong>🔒 Security:</strong> Token is stored locally in your browser only.
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'AtlantisPrivee2024!';

        if (localStorage.getItem('atlantis_github')) {
            window.location.href = '/admin/dashboard.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const token = document.getElementById('token').value.trim();
            const password = document.getElementById('password').value;
            const err = document.getElementById('loginError');

            if (password !== ADMIN_PASSWORD) {
                err.textContent = '⚠ Invalid admin password';
                err.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    localStorage.setItem('atlantis_github', JSON.stringify({ username, repo, token }));
                    window.location.href = '/admin/dashboard.html';
                } else {
                    err.textContent = '⚠ Cannot access repository. Check credentials.';
                    err.style.display = 'block';
                }
            } catch {
                err.textContent = '⚠ Connection error';
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
